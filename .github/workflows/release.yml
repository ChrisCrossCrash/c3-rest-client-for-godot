name: release

on:
  push:
    tags:
      - "v*"

jobs:
  gut:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        godot-version: [4.6.2-stable]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: lihop/setup-godot@v3
        with:
          version: ${{ matrix.godot-version }}

      - name: Import project
        run: godot --headless --path . --import

      - name: Run GUT
        run: |
          godot --headless --path . -s addons/gut/gut_cmdln.gd \
            -gdir=res://tests -ginclude_subdirs -gexit

  release:
    needs: gut
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build asset zip
        run: python scripts/build_asset.py ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/c3_openai_client_${{ github.ref_name }}.zip
          generate_release_notes: true
